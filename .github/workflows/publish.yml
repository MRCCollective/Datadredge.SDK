name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build
      run: dotnet build Datadredge.SDK.csproj -c Release

    - name: Pack
      run: dotnet pack Datadredge.SDK.csproj -c Release -o ./artifacts --no-build

    - name: Publish to GitHub Packages
      run: dotnet nuget push ./artifacts/*.nupkg --source https://nuget.pkg.github.com/MRCCollective/ --api-key ${{ secrets.GITHUB_TOKEN }}
